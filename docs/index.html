<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=privacy-policy.html">
  <title>WorthIt Privacy Policy</title>
  <meta name="description" content="Privacy Policy for the WorthIt Android app.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --surface: #ffffff;
      --text: #1d2528;
      --muted: #5d6a70;
      --accent: #0f6b5f;
      --border: #dce3df;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 18px 50px rgba(22, 38, 42, 0.1);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.1;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.2em;
    }

    a:focus-visible {
      outline: 3px solid rgba(15, 107, 95, 0.35);
      outline-offset: 3px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>WorthIt Privacy Policy</h1>
    <p>You should be redirected automatically.</p>
    <a href="privacy-policy.html">Open the WorthIt Privacy Policy</a>
  </main>
</body>
</html>
